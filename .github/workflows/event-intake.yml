name: Event Intake

on:
  schedule:
    - cron: "30 3 * * *"
  workflow_dispatch:
    inputs:
      apply:
        description: "Persistir PRs e issues"
        required: false
        default: false
        type: boolean
      source_name:
        description: "Executar somente para uma fonte especifica"
        required: false
        type: string
      source_type:
        description: "Executar somente para um tipo especifico"
        required: false
        type: string
      max_sources:
        description: "Limite de fontes por rodada"
        required: false
        default: "200"
        type: string
      max_unique_urls:
        description: "Limite global de URLs unicas processadas"
        required: false
        default: "150"
        type: string
      cache_bust:
        description: "Ignorar cache persistido nesta rodada"
        required: false
        default: false
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  GEMINI_MODEL: gemini-2.5-flash-lite

concurrency:
  group: event-intake-${{ github.ref }}
  cancel-in-progress: false

jobs:
  intake:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Prepare inline source registry
