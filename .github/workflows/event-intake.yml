      - name: Install dependencies
        run: |
          npm ci --ignore-scripts
          npm rebuild esbuild

      - name: Restore event intake cache
        id: intake-cache
        if: github.event_name != 'workflow_dispatch' || inputs.cache_bust != true
        uses: actions/cache/restore@v4
        with:
          path: .cache/event-intake
          key: event-intake-v1-${{ runner.os }}-${{ hashFiles('scripts/event-intake/**/*.mjs', 'src/_data/categories.json') }}
          restore-keys: |
            event-intake-v1-${{ runner.os }}-

      - name: Detect browser-backed sources
        id: sources
        run: |
          node - <<'NODE' >> "$GITHUB_OUTPUT"
          const sources = JSON.parse(process.env.EVENT_INTAKE_SOURCES_JSON || "[]");
          const needsBrowser = sources.some((source) => source.fetch_mode === "browser");
          process.stdout.write(`needs_browser=${needsBrowser}\n`);
          NODE

      - name: Install Playwright Chromium
        if: steps.sources.outputs.needs_browser == 'true'
        run: npx playwright install --with-deps chromium

      - name: Run event intake
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TOKEN_FOR_CI_EVENTS: ${{ secrets.TOKEN_FOR_CI_EVENTS }}
          EVENT_INTAKE_MAX_SOURCES: ${{ inputs.max_sources || '200' }}
          EVENT_INTAKE_MAX_UNIQUE_URLS: ${{ inputs.max_unique_urls || '150' }}
          INPUT_APPLY: ${{ inputs.apply || false }}
          INPUT_SOURCE_NAME: ${{ inputs.source_name || '' }}
          INPUT_SOURCE_TYPE: ${{ inputs.source_type || '' }}
          INPUT_CACHE_BUST: ${{ inputs.cache_bust || false }}
        run: |
          APPLY_FLAG="--dry-run"
          if [ "${GITHUB_EVENT_NAME}" = "schedule" ] || [ "${INPUT_APPLY}" = "true" ]; then
            APPLY_FLAG="--apply"
          fi

          SOURCE_ARG=""
          if [ -n "${INPUT_SOURCE_NAME}" ]; then
            SOURCE_ARG="--source=${INPUT_SOURCE_NAME}"
          fi

          SOURCE_TYPE_ARG=""
          if [ -n "${INPUT_SOURCE_TYPE}" ]; then
            SOURCE_TYPE_ARG="--source-type=${INPUT_SOURCE_TYPE}"
          fi

          CACHE_BUST_ARG=""
          if [ "${INPUT_CACHE_BUST}" = "true" ]; then
            CACHE_BUST_ARG="--cache-bust"
          fi

          node scripts/event-intake/index.mjs \
            "$APPLY_FLAG" \
            "$SOURCE_ARG" \
            "$SOURCE_TYPE_ARG" \
            "$CACHE_BUST_ARG" \
            "--max-sources=${EVENT_INTAKE_MAX_SOURCES}" \
            "--max-urls=${EVENT_INTAKE_MAX_UNIQUE_URLS}"

      - name: Save event intake cache
        if: always() && (github.event_name != 'workflow_dispatch' || inputs.cache_bust != true)
        uses: actions/cache/save@v4
        with:
          path: .cache/event-intake
          key: ${{ steps.intake-cache.outputs.cache-primary-key || format('event-intake-v1-{0}-{1}', runner.os, hashFiles('scripts/event-intake/**/*.mjs', 'src/_data/categories.json')) }}

      - name: Upload intake report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: event-intake-report
          if-no-files-found: ignore
          path: output/event-intake/
