name: SonarQube Cloud

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    name: SonarQube Scan
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    env:
      SONAR_SCANNER_VERSION: 8.0.1.6346
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install SonarScanner CLI
        run: |
          curl -fsSL \
            "https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-${SONAR_SCANNER_VERSION}-linux-x64.zip" \
            -o "$RUNNER_TEMP/sonar-scanner.zip"
          unzip -q -o "$RUNNER_TEMP/sonar-scanner.zip" -d "$RUNNER_TEMP"
          echo "$RUNNER_TEMP/sonar-scanner-${SONAR_SCANNER_VERSION}-linux-x64/bin" >> "$GITHUB_PATH"

      - name: Run SonarQube scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
          SONAR_ROOT_CERT: ${{ secrets.SONAR_ROOT_CERT }}
        run: |
          sonar-scanner -Dsonar.projectBaseDir=.
