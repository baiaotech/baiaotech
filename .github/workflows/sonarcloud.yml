name: SonarQube Cloud

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    name: SonarQube Scan
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    env:
      SONAR_SCANNER_VERSION: 8.0.1.6346
      GIT_CONFIG_COUNT: 1
      GIT_CONFIG_KEY_0: init.defaultBranch
      GIT_CONFIG_VALUE_0: main
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: |
          npm ci --ignore-scripts
          npm rebuild esbuild

      - name: Generate coverage report
        run: npm run test:coverage

      - name: Install SonarScanner CLI
        run: |
          SCANNER_ZIP_URL="https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-${SONAR_SCANNER_VERSION}-linux-x64.zip"

          case "$SCANNER_ZIP_URL" in
            https://*) ;;
            *)
              echo "O download do SonarScanner deve usar HTTPS." >&2
              exit 1
              ;;
          esac

          curl -fsSL \
            --proto '=https' \
            --tlsv1.2 \
            --location \
            "$SCANNER_ZIP_URL" \
            -o "$RUNNER_TEMP/sonar-scanner.zip"
          unzip -q -o "$RUNNER_TEMP/sonar-scanner.zip" -d "$RUNNER_TEMP"
          echo "$RUNNER_TEMP/sonar-scanner-${SONAR_SCANNER_VERSION}-linux-x64/bin" >> "$GITHUB_PATH"

      - name: Run SonarQube scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
          SONAR_ROOT_CERT: ${{ secrets.SONAR_ROOT_CERT }}
        run: |
          sonar-scanner -Dsonar.projectBaseDir=.
