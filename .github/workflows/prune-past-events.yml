name: Prune Past Events

on:
  schedule:
    - cron: "15 3 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  prune:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Remove expired event files
        run: npm run events:prune

      - name: Validate site after pruning
        run: npm run build

      - name: Commit pruned events
        run: |
          if git diff --quiet; then
            echo "No expired events were removed."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/content/events
          git commit -m "chore: remove past events"
          git push
